name: ci

on:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: kuviewer-ci-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest
    timeout-minutes: 25

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install frontend dependencies
        working-directory: website
        run: npm ci

      - name: Frontend typecheck
        working-directory: website
        run: npm run typecheck

      - name: Frontend unit tests
        working-directory: website
        run: npm run test:unit

      - name: Automation helper tests
        run: node --test scripts/lib/*.test.mjs

      - name: Frontend standalone build
        working-directory: website
        run: VITE_BASE_PATH=/ npm run build

      - name: Cache Playwright Chromium
        id: playwright-cache
        uses: actions/cache@v4
        with:
          path: ~/.cache/ms-playwright
          key: playwright-${{ runner.os }}-${{ hashFiles('website/package-lock.json') }}

      - name: Install Playwright system dependencies
        working-directory: website
        run: npx playwright install-deps chromium

      - name: Install Playwright Chromium
        if: steps.playwright-cache.outputs.cache-hit != 'true'
        working-directory: website
        run: npx playwright install chromium

      - name: Desktop CM session runtime smoke
        shell: bash
        run: |
          PREVIEW_LOG="$RUNNER_TEMP/kuviewer-desktop-smoke-preview.log"
          (cd website && VITE_BASE_PATH=/ npm run preview) > "$PREVIEW_LOG" 2>&1 &
          PREVIEW_PID=$!
          cleanup() {
            kill "$PREVIEW_PID" >/dev/null 2>&1 || true
            rm -f "$PREVIEW_LOG"
          }
          trap cleanup EXIT
          node scripts/smoke-desktop-cm-sessions.mjs --url http://127.0.0.1:4174/

      - name: Desktop packaging spec check
        run: node scripts/check-desktop-packaging-spec.mjs

      - name: Deploy workflow preflight check
        run: node scripts/check-deploy-workflow.mjs

      - name: Desktop sidecar build plan check
        run: node scripts/build-desktop-sidecar.mjs --target aarch64-apple-darwin --dry-run

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: false

      - name: Backend tests
        working-directory: server
        run: go test ./...

      - name: Docker build
        run: docker build --build-arg VITE_BASE_PATH=/ -t kuviewer:ci .
