name: ci

on:
  pull_request:
  push:
    branches:
      - main

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Install frontend dependencies
        working-directory: website
        run: npm ci

      - name: Frontend typecheck
        working-directory: website
        run: npm run typecheck

      - name: Frontend standalone build
        working-directory: website
        run: VITE_BASE_PATH=/ npm run build

      - name: Install Playwright Chromium
        working-directory: website
        run: npx playwright install --with-deps chromium

      - name: Desktop native credential runtime smoke
        shell: bash
        run: |
          PREVIEW_LOG="$RUNNER_TEMP/kuviewer-desktop-smoke-preview.log"
          (cd website && VITE_BASE_PATH=/ npm run preview) > "$PREVIEW_LOG" 2>&1 &
          PREVIEW_PID=$!
          cleanup() {
            kill "$PREVIEW_PID" >/dev/null 2>&1 || true
            rm -f "$PREVIEW_LOG"
          }
          trap cleanup EXIT
          node scripts/smoke-desktop-keychain-runtime.mjs --url http://127.0.0.1:4174/

      - name: Desktop packaging spec check
        run: node scripts/check-desktop-packaging-spec.mjs

      - name: Desktop sidecar build plan check
        run: node scripts/build-desktop-sidecar.mjs --target aarch64-apple-darwin --dry-run

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.26.x'
          cache: false

      - name: Backend tests
        working-directory: server
        run: go test ./...

      - name: Docker build
        run: docker build --build-arg VITE_BASE_PATH=/ -t kuviewer:ci .
