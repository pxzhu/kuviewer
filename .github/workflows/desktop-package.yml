name: desktop-package

on:
  workflow_dispatch:
    inputs:
      build_macos:
        description: Build unsigned macOS dmg
        required: true
        default: true
        type: boolean
      build_windows:
        description: Build unsigned Windows exe
        required: true
        default: false
        type: boolean
      signed:
        description: Build with code signing and macOS notarization secrets
        required: true
        default: false
        type: boolean
      package_version:
        description: Desktop package version without leading v; defaults to v* ref or 0.1.0
        required: false
        default: ''
        type: string

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  validate-desktop:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24

      - name: Validate desktop package version input
        env:
          KUVIEWER_DESKTOP_VERSION: ${{ inputs.package_version }}
        run: node scripts/set-desktop-package-version.mjs --print

      - name: Desktop packaging spec check
        run: node scripts/check-desktop-packaging-spec.mjs

  macos-dmg:
    if: inputs.build_macos
    needs: validate-desktop
    runs-on: macos-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: website
        run: npm ci

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm install

      - name: Verify generated icons
        run: node scripts/check-desktop-packaging-spec.mjs

      - name: Resolve desktop package version
        id: desktop-version
        env:
          KUVIEWER_DESKTOP_VERSION: ${{ inputs.package_version }}
        run: node scripts/set-desktop-package-version.mjs --github-output

      - name: Validate macOS signing secrets
        if: ${{ inputs.signed }}
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        run: |
          test -n "$APPLE_CERTIFICATE_BASE64"
          test -n "$APPLE_CERTIFICATE_PASSWORD"
          test -n "$APPLE_SIGNING_IDENTITY"
          test -n "$APPLE_ID"
          test -n "$APPLE_PASSWORD"
          test -n "$APPLE_TEAM_ID"

      - name: Import macOS signing certificate
        if: ${{ inputs.signed }}
        shell: bash
        env:
          APPLE_CERTIFICATE_BASE64: ${{ secrets.APPLE_CERTIFICATE_BASE64 }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
        run: |
          KEYCHAIN_PATH="$RUNNER_TEMP/kuviewer-signing.keychain-db"
          KEYCHAIN_PASSWORD="$(openssl rand -hex 32)"
          CERTIFICATE_PATH="$RUNNER_TEMP/kuviewer-apple-certificate.p12"

          printf '%s' "$APPLE_CERTIFICATE_BASE64" | base64 --decode > "$CERTIFICATE_PATH"
          security create-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security set-keychain-settings -lut 21600 "$KEYCHAIN_PATH"
          security unlock-keychain -p "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          security import "$CERTIFICATE_PATH" -P "$APPLE_CERTIFICATE_PASSWORD" -A -t cert -f pkcs12 -k "$KEYCHAIN_PATH" -T /usr/bin/codesign -T /usr/bin/security
          security list-keychains -d user -s "$KEYCHAIN_PATH" $(security list-keychains -d user | sed 's/[ "]//g')
          security default-keychain -s "$KEYCHAIN_PATH"
          security set-key-partition-list -S apple-tool:,apple:,codesign: -s -k "$KEYCHAIN_PASSWORD" "$KEYCHAIN_PATH"
          rm -f "$CERTIFICATE_PATH"

          echo "KUVIEWER_MACOS_KEYCHAIN_PATH=$KEYCHAIN_PATH" >> "$GITHUB_ENV"

      - name: Configure macOS signing
        if: ${{ inputs.signed }}
        env:
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: node scripts/configure-desktop-signing.mjs --macos

      - name: Build unsigned macOS dmg
        if: ${{ !inputs.signed }}
        working-directory: desktop
        run: npm run tauri:build -- --bundles dmg

      - name: Build signed and notarized macOS dmg
        if: ${{ inputs.signed }}
        working-directory: desktop
        env:
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
        run: npm run tauri:build -- --bundles dmg

      - name: Clean macOS signing keychain
        if: ${{ always() && inputs.signed }}
        shell: bash
        run: |
          if [ -n "${KUVIEWER_MACOS_KEYCHAIN_PATH:-}" ]; then
            security delete-keychain "$KUVIEWER_MACOS_KEYCHAIN_PATH" || true
          fi
          rm -f "$RUNNER_TEMP/kuviewer-apple-certificate.p12"

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: kuviewer-macos-dmg-${{ steps.desktop-version.outputs.version }}
          path: desktop/src-tauri/target/release/bundle/dmg/*
          if-no-files-found: error

  windows-exe:
    if: inputs.build_windows
    needs: validate-desktop
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: npm
          cache-dependency-path: website/package-lock.json

      - name: Setup Rust
        uses: dtolnay/rust-toolchain@stable

      - name: Install frontend dependencies
        working-directory: website
        run: npm ci

      - name: Install desktop dependencies
        working-directory: desktop
        run: npm install

      - name: Verify generated icons
        run: node scripts/check-desktop-packaging-spec.mjs

      - name: Resolve desktop package version
        id: desktop-version
        env:
          KUVIEWER_DESKTOP_VERSION: ${{ inputs.package_version }}
        run: node scripts/set-desktop-package-version.mjs --github-output

      - name: Validate Windows signing secrets
        if: ${{ inputs.signed }}
        shell: bash
        env:
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          test -n "$WINDOWS_CERTIFICATE_BASE64"
          test -n "$WINDOWS_CERTIFICATE_PASSWORD"

      - name: Import Windows signing certificate
        if: ${{ inputs.signed }}
        shell: pwsh
        env:
          WINDOWS_CERTIFICATE_BASE64: ${{ secrets.WINDOWS_CERTIFICATE_BASE64 }}
          WINDOWS_CERTIFICATE_PASSWORD: ${{ secrets.WINDOWS_CERTIFICATE_PASSWORD }}
        run: |
          $certificatePath = Join-Path $env:RUNNER_TEMP "kuviewer-windows-certificate.pfx"
          [IO.File]::WriteAllBytes($certificatePath, [Convert]::FromBase64String($env:WINDOWS_CERTIFICATE_BASE64))
          $securePassword = ConvertTo-SecureString -String $env:WINDOWS_CERTIFICATE_PASSWORD -Force -AsPlainText
          $certificate = Import-PfxCertificate -FilePath $certificatePath -CertStoreLocation Cert:\CurrentUser\My -Password $securePassword
          if (-not $certificate.Thumbprint) {
            throw "Imported Windows signing certificate did not expose a thumbprint"
          }
          "WINDOWS_CERTIFICATE_THUMBPRINT=$($certificate.Thumbprint)" | Out-File -FilePath $env:GITHUB_ENV -Encoding utf8 -Append
          Remove-Item -Force $certificatePath

      - name: Configure Windows signing
        if: ${{ inputs.signed }}
        env:
          WINDOWS_TIMESTAMP_URL: ${{ vars.WINDOWS_TIMESTAMP_URL }}
        run: node scripts/configure-desktop-signing.mjs --windows

      - name: Build unsigned Windows exe
        if: ${{ !inputs.signed }}
        working-directory: desktop
        run: npm run tauri:build -- --bundles nsis

      - name: Build signed Windows exe
        if: ${{ inputs.signed }}
        working-directory: desktop
        run: npm run tauri:build -- --bundles nsis

      - name: Clean Windows signing certificate
        if: ${{ always() && inputs.signed }}
        shell: pwsh
        run: |
          if ($env:WINDOWS_CERTIFICATE_THUMBPRINT) {
            Get-ChildItem Cert:\CurrentUser\My |
              Where-Object { $_.Thumbprint -eq $env:WINDOWS_CERTIFICATE_THUMBPRINT } |
              Remove-Item -Force
          }
          Remove-Item -Force -ErrorAction SilentlyContinue (Join-Path $env:RUNNER_TEMP "kuviewer-windows-certificate.pfx")

      - name: Upload Windows artifact
        uses: actions/upload-artifact@v4
        with:
          name: kuviewer-windows-exe-${{ steps.desktop-version.outputs.version }}
          path: desktop/src-tauri/target/release/bundle/nsis/*
          if-no-files-found: error
