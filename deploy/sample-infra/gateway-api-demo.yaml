apiVersion: v1
kind: Namespace
metadata:
  name: kuviewer-gateway-demo
  labels:
    kuviewer.io/sample: "true"
    team: edge
---
apiVersion: v1
kind: Service
metadata:
  name: gateway-demo-api
  namespace: kuviewer-gateway-demo
  labels:
    kuviewer.io/sample: "true"
    app.kubernetes.io/name: gateway-demo-api
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: gateway-demo-api
  ports:
    - name: http
      port: 80
      targetPort: http
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: gateway-demo-api
  namespace: kuviewer-gateway-demo
  labels:
    kuviewer.io/sample: "true"
    app.kubernetes.io/name: gateway-demo-api
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: gateway-demo-api
  template:
    metadata:
      labels:
        kuviewer.io/sample: "true"
        app.kubernetes.io/name: gateway-demo-api
    spec:
      containers:
        - name: api
          image: nginx:1.27-alpine
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 80
---
apiVersion: gateway.networking.k8s.io/v1
kind: Gateway
metadata:
  name: public-gateway
  namespace: kuviewer-gateway-demo
  labels:
    kuviewer.io/sample: "true"
    app.kubernetes.io/name: public-gateway
spec:
  gatewayClassName: example
  listeners:
    - name: http
      protocol: HTTP
      port: 80
      hostname: gateway-demo.local
---
apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: gateway-demo-api
  namespace: kuviewer-gateway-demo
  labels:
    kuviewer.io/sample: "true"
    app.kubernetes.io/name: gateway-demo-api
spec:
  parentRefs:
    - name: public-gateway
  hostnames:
    - gateway-demo.local
  rules:
    - backendRefs:
        - name: gateway-demo-api
          port: 80
