apiVersion: v1
kind: Namespace
metadata:
  name: kuviewer
---
apiVersion: v1
kind: Secret
metadata:
  name: kuviewer-admin
  namespace: kuviewer
type: Opaque
stringData:
  admin-token: change-me
---
apiVersion: v1
kind: ServiceAccount
metadata:
  name: kuviewer
  namespace: kuviewer
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: kuviewer-readonly
rules:
  - apiGroups: [""]
    resources:
      - namespaces
      - nodes
      - pods
      - serviceaccounts
      - services
      - configmaps
      - persistentvolumes
      - persistentvolumeclaims
    verbs: ["get", "list", "watch"]
  - apiGroups: ["discovery.k8s.io"]
    resources:
      - endpointslices
    verbs: ["get", "list", "watch"]
  - apiGroups: ["apps"]
    resources:
      - deployments
      - replicasets
      - statefulsets
      - daemonsets
    verbs: ["get", "list", "watch"]
  - apiGroups: ["networking.k8s.io"]
    resources:
      - ingresses
    verbs: ["get", "list", "watch"]
  - apiGroups: ["storage.k8s.io"]
    resources:
      - storageclasses
    verbs: ["get", "list", "watch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: kuviewer-readonly
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: kuviewer-readonly
subjects:
  - kind: ServiceAccount
    name: kuviewer
    namespace: kuviewer
---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: kuviewer
  namespace: kuviewer
  labels:
    app.kubernetes.io/name: kuviewer
spec:
  replicas: 1
  selector:
    matchLabels:
      app.kubernetes.io/name: kuviewer
  template:
    metadata:
      labels:
        app.kubernetes.io/name: kuviewer
    spec:
      serviceAccountName: kuviewer
      containers:
        - name: kuviewer
          image: kuviewer:local
          imagePullPolicy: IfNotPresent
          ports:
            - name: http
              containerPort: 8080
          env:
            - name: KUVIEWER_SOURCE
              value: kubernetes
            - name: KUVIEWER_LISTEN_ADDR
              value: 0.0.0.0:8080
            - name: KUVIEWER_STATIC_DIR
              value: /app/static
            - name: KUVIEWER_CLUSTER_ID
              value: in-cluster
            - name: KUVIEWER_CLUSTER_NAME
              value: in-cluster
            - name: KUVIEWER_ADMIN_TOKEN
              valueFrom:
                secretKeyRef:
                  name: kuviewer-admin
                  key: admin-token
          readinessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 3
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /healthz
              port: http
            initialDelaySeconds: 10
            periodSeconds: 20
          securityContext:
            allowPrivilegeEscalation: false
            readOnlyRootFilesystem: true
            runAsNonRoot: true
            runAsUser: 10001
            capabilities:
              drop: ["ALL"]
---
apiVersion: v1
kind: Service
metadata:
  name: kuviewer
  namespace: kuviewer
  labels:
    app.kubernetes.io/name: kuviewer
spec:
  type: ClusterIP
  selector:
    app.kubernetes.io/name: kuviewer
  ports:
    - name: http
      port: 8080
      targetPort: http
